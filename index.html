<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO SNDSG.</title>
    <style>
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 163, 255, 0.3); } 50% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 8px rgba(0, 163, 255, 0); } 100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 163, 255, 0); } }
        *{ margin:0; padding:0; box-sizing:border-box; }
        /* КАСТОМНЫЙ СКРОЛЛБАР (ВАРИАНТ 3) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #070708; }
        ::-webkit-scrollbar-thumb { background: #00a3ff; border-radius: 10px; border: 2px solid #070708; }
        ::-webkit-scrollbar-thumb:hover { background: #008be0; }
        body { background:#070708 !important; color:white !important; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; position: relative; overflow-x: hidden; animation: pageFadeIn 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        body.modal-open { overflow: hidden; animation: none; }
        body::before, body::after { content: ""; position: fixed; width: 400px; height: 400px; border-radius: 50%; pointer-events: none; z-index: -1; filter: blur(140px); opacity: 0.15; }
        body::before { top: -100px; left: -100px; background: #a300ff; }
        body::after { bottom: -100px; right: -100px; background: #00a3ff; }
        .hero { text-align:center; padding: 100px 20px 40px; }
        .hero h1 { color: #ffffff !important; font-size: clamp(40px, 7vw, 75px); line-height: 1; letter-spacing:-2px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
        .hero p { color:#666 !important; font-size: 13px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
        /* ЖИВОЙ МИГАЮЩИЙ СТАТУС (ВАРИАНТ 2) */
        .status-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(0, 163, 255, 0.06); border: 1px solid rgba(0, 163, 255, 0.15); padding: 8px 18px; border-radius: 30px; font-size: 12px; font-weight: 600; color: #00a3ff; text-transform: uppercase; letter-spacing: 1px; }
        .status-dot { width: 8px; height: 8px; background: #00a3ff; border-radius: 50%; animation: pulse 2s infinite; }
        .works { width: min(1200px, 95%); margin: 40px auto 80px; display: grid; grid-template-columns: 1fr 340px 1fr; gap: 35px; align-items: start; }
        .card { background: #111113; border-radius: 24px; overflow: hidden; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease; width: 100%; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.03); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0, 163, 255, 0.08); border-color: rgba(0, 163, 255, 0.2); }
        .card img { width: 100%; height: auto; display: block; object-fit: contain; }
        .work1 { grid-column: 1; grid-row: 1; } .work4 { grid-column: 1; grid-row: 2; }
        .work2 { grid-column: 2; grid-row: 1 / 3; }
        .work3 { grid-column: 3; grid-row: 1; } .work5 { grid-column: 3; grid-row: 2; }
        .stats-container { width: min(800px, 90%); margin: 60px auto 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 40px; }
        .stat-box .stat-num { font-size: clamp(28px, 4vw, 42px); font-weight: 800; color: #fff; line-height: 1; margin-bottom: 8px; letter-spacing: -1px; }
        .stat-box:nth-child(2) .stat-num { color: #00a3ff; }
        .stat-box .stat-text { font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .footer { text-align: center; padding: 20px 20px 120px; }
        .footer h2 { font-size: 20px; margin-bottom: 25px; font-weight: 600; color: #fff; }
        .btn-funpay { display: inline-flex; align-items: center; padding: 18px 44px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 16px; background: #00a3ff; color: #fff !important; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0, 163, 255, 0.25); }
        .btn-funpay:hover { background: #008be0; transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0, 163, 255, 0.45); }
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.97); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(20px); }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox-content { position: relative; max-width: 85%; max-height: 85vh; display: flex; justify-content: center; align-items: center; }
        .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); object-fit: contain; opacity: 0; transform: scale(0.95); transition: opacity 0.2s ease, transform 0.2s ease; }
        .lightbox img.show { opacity: 1; transform: scale(1); }
        .lightbox-close { position: absolute; top: -50px; right: 0; color: #555; font-size: 40px; font-weight: 300; cursor: pointer; user-select: none; }
        .lightbox-close:hover { color: #fff; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.06); color: #fff; width: 54px; height: 54px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; user-select: none; font-size: 24px; z-index: 10000; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-50%) scale(1.05); }
        .prev-btn { left: -80px; } .next-btn { right: -80px; }
        @media(max-width: 900px){
            .works{ display: flex; flex-direction: column; gap: 25px; }
            .work2 { order: 1; } .work1 { order: 2; } .work3 { order: 3; } .work4 { order: 4; } .work5 { order: 5; }
            .stats-container { grid-template-columns: 1fr; gap: 30px; }
            .nav-btn { width: 44px; height: 44px; background: rgba(10, 10, 10, 0.8); }
            .prev-btn { left: 10px; } .next-btn { right: 10px; } .lightbox-close { top: -60px; right: 10px; }
        }
    </style>
</head>
<body>

<section class="hero">
    <h1>PORTFOLIO SNDSG.</h1>
    <p>Design • Branding • Marketplace Design</p>
    <!-- ПУЛЬСИРУЮЩИЙ БЭЙДЖ ОНЛАЙНА -->
    <div class="status-badge">
        <div class="status-dot"></div>
        Online • Свободен для заказов
    </div>
</section>

<section class="works">
    <div class="card work1"><img src="work1.jpg" alt=""></div>
    <div class="card work2"><img src="work2.jpg" alt=""></div>
    <div class="card work3"><img src="work3.jpg" alt=""></div>
    <div class="card work4"><img src="work4.jpg" alt=""></div>
    <div class="card work5"><img src="work5.jpg" alt=""></div>
</section>

<section class="stats-container">
    <div class="stat-box"><div class="stat-num">130+</div><div class="stat-text">Отзывов на FunPay</div></div>
    <div class="stat-box"><div class="stat-num">5.0 ★</div><div class="stat-text">Рейтинг продавца</div></div>
    <div class="stat-box"><div class="stat-num">2 часа</div><div class="stat-text">Средний срок сдачи</div></div>
</section>

<footer class="footer">
    <h2>Обсудить ваш проект:</h2>
    <a href="https://funpay.com/users/13442980/" target="_blank" class="btn-funpay">Открыть профиль FunPay</a>
</footer>

<div class="lightbox" id="lightbox">
    <div class="lightbox-content">
        <span class="lightbox-close" id="closeBtn">&times;</span>
        <div class="nav-btn prev-btn" id="prevBtn">&larr;</div>
        <img src="" alt="" id="lightboxImg">
        <div class="nav-btn next-btn" id="nextBtn">&rarr;</div>
    </div>
</div>

<script>
    const images = Array.from(document.querySelectorAll('.works .card img'));
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const closeBtn = document.getElementById('closeBtn');
    let currentIndex = 0;
    function updateImage(index) { currentIndex = index; lightboxImg.classList.remove('show'); setTimeout(() => { lightboxImg.src = images[currentIndex].src; lightboxImg.classList.add('show'); }, 100); }
    images.forEach((img, index) => { img.addEventListener('click', (e) => { e.stopPropagation(); lightbox.classList.add('active'); document.body.classList.add('modal-open'); updateImage(index); }); });
    function showNext() { let nextIndex = currentIndex + 1; if (nextIndex >= images.length) nextIndex = 0; updateImage(nextIndex); }
    function showPrev() { let prevIndex = currentIndex - 1; if (prevIndex < 0) prevIndex = images.length - 1; updateImage(prevIndex); }
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showNext(); });
    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
    function closeLightbox() { lightbox.classList.remove('active'); lightboxImg.classList.remove('show'); document.body.classList.remove('modal-open'); }
    closeBtn.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox || e.target.classList.contains('lightbox-content')) closeLightbox(); });
    document.addEventListener('keydown', (e) => { if (!lightbox.classList.contains('active')) return; if (e.key === 'ArrowRight') showNext(); if (e.key === 'ArrowLeft') showPrev(); if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
